  <div class="info">

  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 输入</div>
      <textarea id="input"># showdown.js 测试

## 历史地位

showdown 是最早的 JavaScript Markdown 解析器之一，2012 年发布，最初是 Markdown.js 的分支。

## 配置选项

showdown 提供了丰富的配置选项：

- `tables`: 启用表格
- `simplifiedAutoLink`: 自动链接
- `strikethrough`: 删除线
- `tasklists`: 任务列表
- `smoothLivePreview`: 平滑预览

## 自动链接

访问 https://github.com/showdownjs/showdown 了解更多。

## 表格

| 库 | 首次发布 | Stars |
|----|----------|-------|
| marked | 2011 | 33k+ |
| showdown | 2012 | 13k+ |
| markdown-it | 2014 | 18k+ |
| remark | 2015 | 8k+ |

## 扩展系统

showdown 支持自定义扩展：

```javascript
showdown.extension('myExt', () => [{
  type: 'lang',
  regex: /\(c\)/g,
  replace: '©'
}]);
```

**渲染时间：** <span id="render-time">-</span> ms
</textarea>
    </div>
    
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/showdown@2/dist/showdown.min.js"></script>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    
    const converter = new showdown.Converter({
      tables: true,
      simplifiedAutoLink: true,
      strikethrough: true,
      tasklists: true,
      smoothLivePreview: true
    });
    
    function render() {
      const start = performance.now();
      output.innerHTML = converter.makeHtml(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    
    input.addEventListener('input', render);
    render();
  </script>
</body>
