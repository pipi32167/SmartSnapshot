    </div>
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>
  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js';
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    function render() {
      const start = performance.now();
      output.innerHTML = marked.parse(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    input.addEventListener('input', render);
    render();
  </script>
