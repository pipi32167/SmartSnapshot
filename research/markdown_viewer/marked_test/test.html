<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marked.js 测试</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-header {
      background: #f5f5f5;
      padding: 10px 15px;
      font-weight: 600;
      border-bottom: 1px solid #ddd;
    }
    textarea {
      width: 100%;
      height: 500px;
      border: none;
      padding: 15px;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      resize: vertical;
    }
    .output {
      padding: 15px;
      height: 500px;
      overflow: auto;
    }
    .info {
      background: #f0f8ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>📝 marked.js 测试</h1>
  
  <div class="info">
    <strong>库信息：</strong> marked.js v15.x | 零依赖 | ~25KB gzip
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 输入</div>
      <textarea id="input"># marked.js 测试文档

## 基础语法

**粗体文本** 和 *斜体文本*

> 这是一段引用文本

## 列表

### 无序列表
- 项目 1
- 项目 2
  - 子项目 2.1
  - 子项目 2.2
- 项目 3

### 有序列表
1. 第一步
2. 第二步
3. 第三步

## 代码

行内代码：`const x = 1;`

代码块：
```javascript
function hello() {
  console.log('Hello, marked.js!');
}
```

## 表格 (GFM)

| 功能 | 支持 | 备注 |
|------|------|------|
| 基础语法 | ✅ | 完整支持 |
| GFM | ✅ | 通过插件 |
| 代码高亮 | ✅ | 通过插件 |

## 链接和图片

[marked.js 官网](https://marked.js.org/)

![示例图片](https://via.placeholder.com/400x200/6c5ce7/ffffff?text=marked.js)

## 任务列表 (GFM)

- [x] 已完成任务
- [ ] 未完成任务
- [x] 另一个已完成任务

---

**渲染时间：** <span id="render-time">-</span> ms
</textarea>
    </div>
    
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js';
    
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    
    function render() {
      const start = performance.now();
      output.innerHTML = marked.parse(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    
    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
