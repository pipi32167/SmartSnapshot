<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;

    }
    .panel {

    }

<body>
  <h1>📝 micromark 测试</h1>
  
  <div class="info">
    <strong>库信息：</strong> micromark v4.x | ~15KB gzip | 流式处理 | 零依赖
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 输入</div>
      <textarea id="input"># micromark 测试

## 核心优势

### 体积极小

micromark 是目前体积最小的符合 CommonMark 规范的解析器：

| 库 | 体积 (gzip) |
|----|-------------|
| micromark | ~15KB |
| marked | ~25KB |
| markdown-it | ~45KB |
| remark | ~80KB+ |

### 流式处理

支持分块输入，内存友好：

```javascript
import { compile } from 'micromark';

const compileStream = compile();
compileStream.write('# ');
compileStream.write('Hello');
compileStream.write(' World');
const result = compileStream.end();
```

### 符合规范

- 100% CommonMark 兼容
- 通过全部 649 个测试用例

## 使用场景

- ✅ 嵌入式设备
- ✅ IoT 设备
- ✅ 对体积敏感的项目
- ✅ 需要流式处理的场景
- ❌ 需要丰富插件（功能基础）

---

**渲染时间：** <span id="render-time">-</span> ms
</textarea>
    </div>
    
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>

  <script type="module">
    import { micromark } from 'https://esm.sh/micromark@4';
    
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    
    function render() {
      const start = performance.now();
      output.innerHTML = micromark(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    
    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
