<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markdown-it 测试</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .panel-header { background: #f5f5f5; padding: 10px 15px; font-weight: 600; border-bottom: 1px solid #ddd; }
    textarea { width: 100%; height: 500px; border: none; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; resize: vertical; }
    .output { padding: 15px; height: 500px; overflow: auto; }
    .info { background: #f0fff0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    a.back { display: inline-block; margin-bottom: 10px; color: #666; }
  </style>
</head>
<body>
  <a href="../all_test/index.html" class="back">← 返回导航</a>
  <h1>📝 markdown-it 测试</h1>
  <div class="info"><strong>库信息：</strong> markdown-it v14.x | 100% CommonMark | ~45KB gzip | 🔒 内置安全模式</div>
  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 输入</div>
      <textarea id="input"># markdown-it 测试文档

## 安全特性

markdown-it 默认禁用 HTML，防止 XSS：

&lt;script&gt;alert('xss')&lt;/script&gt; ← 会被转义

## 排版优化

自动识别 URL: https://github.com/markdown-it/markdown-it

## Emoji

:smile: :heart: :thumbsup:

## 脚注[^1]

[^1]: 这是脚注内容

## 任务列表

- [x] 设计文档
- [ ] 编写代码
- [ ] 测试验收

## 表格

| 特性 | marked.js | markdown-it |
|------|-----------|-------------|
| 体积 | 25KB | 45KB |
| CommonMark | 部分 | 100% |
| 安全模式 | 需配置 | 内置 |

**渲染时间：** <span id="render-time">-</span> ms</textarea>
    </div>
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    const md = window.markdownit({ html: false, linkify: true, typographer: true });
    function render() {
      const start = performance.now();
      output.innerHTML = md.render(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
