<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markdown-it 测试</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-header {
      background: #f5f5f5;
      padding: 10px 15px;
      font-weight: 600;
      border-bottom: 1px solid #ddd;
    }
    textarea {
      width: 100%;
      height: 500px;
      border: none;
      padding: 15px;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      resize: vertical;
    }
    .output {
      padding: 15px;
      height: 500px;
      overflow: auto;
    }
    .info {
      background: #f0fff0;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>📝 markdown-it 测试</h1>
  
  <div class="info">
    <strong>库信息：</strong> markdown-it v14.x | 100% CommonMark | ~45KB gzip
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 输入</div>
      <textarea id="input"># markdown-it 测试文档

## 安全特性

markdown-it 默认启用安全模式，禁用 HTML 标签，有效防止 XSS 攻击。

## 排版优化

- 自动识别 URL: https://github.com/markdown-it/markdown-it
- 引号替换: "Hello" -> "Hello"
- 省略号: ... -> ...

## 脚注支持[^1]

这是一个带脚注的段落[^2]。

[^1]: 脚注1的内容
[^2]: 脚注2的内容

## Emoji 支持

:smile: :heart: :thumbsup: :rocket:

## 定义列表

术语 1
:   定义 1a
:   定义 1b

术语 2
:   定义 2

## 缩写

*[HTML]: Hyper Text Markup Language
*[W3C]: World Wide Web Consortium

HTML 规范由 W3C 制定。

## 任务列表

- [x] 设计文档
- [x] 编写代码
- [ ] 测试验收
- [ ] 部署上线

## 表格

| 特性 | marked.js | markdown-it |
|------|-----------|-------------|
| 体积 | 25KB | 45KB |
| CommonMark | 部分 | 100% |
| 插件生态 | 中等 | 丰富 |
| 安全模式 | 需配置 | 内置 |

---

**渲染时间：** <span id="render-time">-</span> ms
</textarea>
    </div>
    
    <div class="panel">
      <div class="panel-header">HTML 预览</div>
      <div id="output" class="output markdown-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const renderTime = document.getElementById('render-time');
    
    // 配置 markdown-it
    const md = window.markdownit({
      html: false,
      linkify: true,
      typographer: true
    });
    
    function render() {
      const start = performance.now();
      output.innerHTML = md.render(input.value);
      const end = performance.now();
      renderTime.textContent = (end - start).toFixed(2);
    }
    
    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
